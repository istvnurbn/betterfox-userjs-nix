name: Sync Betterfox prefs

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run extractor
        run: ./betterfox-extract.sh

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -- prefs/*.json
          git diff --cached --quiet && exit 0
          git commit -m "sync betterfox prefs"
          git push
